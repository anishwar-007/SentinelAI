[alembic]
# Reference deployment: composite env registers demo document models and uses
# the shared Platform revision chain.
# For Platform-only installs, point script_location at
# sentinelai_platform/persistence/postgres/migrations.
script_location = examples/reference_runtime/db/migrations
version_locations = %(here)s/sentinelai_platform/persistence/postgres/migrations/versions
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
